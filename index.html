<!DOCTYPE html>

<html>

<head>

<title>Southeast Skunk Ape Tracker</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="top-section">

    <div>
<div class="top-section">

    <div>

        <h1>Southeast Skunk Ape Tracker</h1>

        <p>Tracking cryptid activity across the Deep South.</p>

    <div class="video-monitor">

    <img src="skunkape.mp4.gif" class="security-feed">

    <div class="monitor-label">
        SECURITY FEED - CAMERA 04 - STILL DON'T BELIEVE?
    </div>

</div>
        


<h2>Report a Sighting</h2>

<p>Your Name:</p>
<input type="text" id="name">

<p>Location of Sighting:</p>
<input type="text" id="location">

<p>Describe What You Saw:</p>
<textarea rows="6" cols="40" id="story"></textarea>

<p>Upload Evidence Photo:</p>
<input type="file" id="photo">

<br><br>

<button onclick="submitSighting()">
Submit Sighting
</button>

<hr>

<h2>Evidence Board</h2>

<div id="board"></div>

<script>

let selectedCard = null;
let cardCount = 0;

function submitSighting() {

    let name =
        document.getElementById("name").value;

    let location =
        document.getElementById("location").value;

    let story =
        document.getElementById("story").value;

    let photo =
        document.getElementById("photo").files[0];

    let board =
        document.getElementById("board");

    let card =
        document.createElement("div");

    card.classList.add("card");

    let time =
        new Date().toLocaleString();

    card.innerHTML =
        "<h3>" + location + "</h3>" +
        "<p><strong>Witness:</strong> " + name + "</p>" +
        "<p><strong>Time:</strong> " + time + "</p>" +
        "<p>" + story + "</p>";


if (photo) {

    let image =
        document.createElement("img");

    image.style.width = "160px";

    image.style.display = "block";

    image.style.marginTop = "10px";

    image.src =
        URL.createObjectURL(photo);

    card.appendChild(image);

    document.getElementById("name").value = "";

document.getElementById("location").value = "";

document.getElementById("story").value = "";

document.getElementById("photo").value = "";
}

card.onclick = function() {

    if (selectedCard == null) {

        selectedCard = card;

        card.classList.add("selected");
    }

    else if (selectedCard !== card) {

        let line =
            document.createElement("div");

        line.classList.add("connection");

        let x1 =
            selectedCard.offsetLeft + 110;

        let y1 =
            selectedCard.offsetTop + 110;

        let x2 =
            card.offsetLeft + 110;

        let y2 =
            card.offsetTop + 110;

        let length =
            Math.sqrt(
                ((x2 - x1) ** 2) +
                ((y2 - y1) ** 2)
            );

        let angle =
            Math.atan2(
                y2 - y1,
                x2 - x1
            ) * 180 / Math.PI;

        line.style.width =
            length + "px";

        line.style.left =
            x1 + "px";

        line.style.top =
            y1 + "px";

        line.style.transform =
            "rotate(" + angle + "deg)";

        board.appendChild(line);

        selectedCard.classList.remove("selected");

        selectedCard = null;
    }
}

let column =
    cardCount % 4;

let row =
    Math.floor(cardCount / 4);

let randomOffsetX =
    Math.floor(Math.random() * 40);

let randomOffsetY =
    Math.floor(Math.random() * 40);

card.style.left =
    (80 + column * 260 + randomOffsetX) + "px";

card.style.top =
    (80 + row * 260 + randomOffsetY) + "px";

cardCount++;

board.appendChild(card);

document.getElementById("name").value = "";

document.getElementById("location").value = "";

document.getElementById("story").value = "";

document.getElementById("photo").value = "";
}

</script>

</body>

</html>

</body>

</html>
