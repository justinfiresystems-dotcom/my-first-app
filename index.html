<h1>Georgia Skunk Ape Tracker</h1>

<p>Latest Sightings:</p>

<ul id="sightings">
</ul>

<button onclick="addSighting()">
Report Sighting
</button>

<script>

function addSighting() {

    let places = [
        "Okefenokee Swamp",
        "North Georgia Mountains",
        "Near Macon",
        "Outside Savannah",
        "Deep woods near Athens"
    ];

    let randomPlace =
        places[Math.floor(Math.random() * places.length)];

    let newSighting =
        document.createElement("li");

    newSighting.textContent =
        "Possible Skunk Ape spotted at " + randomPlace;

    document
        .getElementById("sightings")
        .appendChild(newSighting);
}

</script>
